version: '3.8'

services:
  backend:
    volumes: []
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    restart: always

  worker:
    volumes: []
    command: celery -A app.worker.celery_app worker --loglevel=warning --concurrency=8
    restart: always

  websocket:
    volumes: []
    command: npm start
    restart: always

  frontend:
    volumes: []
    command: npm start
    restart: always

  db:
    restart: always

  redis:
    restart: always

  prometheus:
    restart: always

  grafana:
    restart: always

  nginx:
    restart: always
